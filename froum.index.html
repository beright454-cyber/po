<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colorful Brand Palette */
            --brand-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --input-bg: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
            
            /* Fluid Grid & Spacing */
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #f3f4f6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Portfolio Engineering: Responsive Container */
        .form-card {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        @media (min-width: 768px) {
            .form-card {
                flex-direction: row;
            }
        }

        /* Sidebar Info - Performance Asset Loading style */
        .form-sidebar {
            background: var(--brand-gradient);
            padding: 40px;
            color: var(--white);
            flex: 1;
        }

        .form-sidebar h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .form-sidebar p {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Form Layout: CSS Grid Mastery */
        .form-content {
            padding: 40px;
            flex: 2;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 640px) {
            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .span-2 { grid-column: span 2; }
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Professional UI Inputs */
        .field-group input, 
        .field-group select, 
        .field-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: var(--input-bg);
            font-size: 1rem;
            transition: var(--transition);
        }

        .field-group input:focus {
            outline: none;
            border-color: #6366f1;
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Advanced Button UI */
        .submit-wrapper {
            margin-top: 30px;
        }

        .btn-gradient {
            background: var(--brand-gradient);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        /* Accessibility: Keyboard navigation focus */
        .btn-gradient:focus-visible {
            outline: 3px solid #111827;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-sidebar">
        <h1>Let's Connect</h1>
        <p>Fill out the form to get started. Our team typically responds within 24 hours.</p>
        <div style="margin-top: 40px; font-size: 0.9rem;">
            <div style="margin-bottom: 15px;">✓ Secure Data Encryption</div>
            <div style="margin-bottom: 15px;">✓ Professional Consultation</div>
            <div>✓ Global Support</div>
        </div>
    </div>

    <div class="form-content">
        <form id="pro-form">
            <div class="input-grid">
                <div class="field-group">
                    <label for="fname">Full Name</label>
                    <input type="text" id="fname" placeholder="Enter your name" required>
                </div>

                <div class="field-group">
                    <label for="uemail">Email Address</label>
                    <input type="email" id="uemail" placeholder="name@company.com" required>
                </div>

                <div class="field-group">
                    <label for="uphone">Phone Number</label>
                    <input type="tel" id="uphone" placeholder="+1 (000) 000-0000" required>
                </div>

                <div class="field-group">
                    <label for="ucountry">Country</label>
                    <select id="ucountry" required>
                        <option value="">Select Region</option>
                        <option value="US">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="PL">Poland</option>
                        <option value="BD">Bangladesh</option>
                        <option value="AE">United Arab Emirates</option>
                        <option value="DE">Germany</option>
                    </select>
                </div>

                <div class="field-group span-2">
                    <label for="subject">Project Type</label>
                    <select id="subject">
                        <option>Web Development</option>
                        <option>Embed Integration</option>
                        <option>Portfolio Design</option>
                        <option>Other Service</option>
                    </select>
                </div>

                <div class="field-group span-2">
                    <label for="msg">Additional Details</label>
                    <textarea id="msg" rows="4" placeholder="Tell us more about your needs..."></textarea>
                </div>
            </div>

            <div class="submit-wrapper">
                <button type="submit" class="btn-gradient">Send Message</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
